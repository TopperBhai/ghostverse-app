<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostVerse Admin Panel</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --border: #27272a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 { margin: 0; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        h1 span { color: var(--primary); }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media(min-width: 768px) {
            .grid { grid-template-columns: 2fr 1fr; }
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-header h2 { margin: 0; font-size: 18px; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th { color: var(--text-muted); font-weight: 600; }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-active { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-banned { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-muted { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        
        .badge-user { background: rgba(161, 161, 170, 0.2); color: var(--text-muted); }
        .badge-admin { background: rgba(139, 92, 246, 0.2); color: var(--primary); }

        button {
            background-color: var(--border);
            color: var(--text-main);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover { background-color: #3f3f46; }
        button.btn-primary { background-color: var(--primary); color: white; }
        button.btn-primary:hover { background-color: var(--primary-hover); }
        button.btn-danger { background-color: rgba(239, 68, 68, 0.2); color: var(--danger); }
        button.btn-danger:hover { background-color: var(--danger); color: white; }
        button.btn-warning { background-color: rgba(245, 158, 11, 0.2); color: var(--warning); }
        button.btn-warning:hover { background-color: var(--warning); color: white; }
        button.btn-success { background-color: rgba(16, 185, 129, 0.2); color: var(--success); }
        button.btn-success:hover { background-color: var(--success); color: white; }

        .actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .chat-container {
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-msg {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 11px;
        }

        .chat-author { font-weight: bold; color: var(--primary); }

        #error-box {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid var(--danger);
        }

        .stat-boxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-box .number { font-size: 28px; font-weight: bold; color: var(--primary); margin: 5px 0; }
        .stat-box .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .form-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group input { 
            flex: 1; 
            padding: 8px 12px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            background: var(--bg-dark); 
            color: white; 
            font-family: inherit; 
        }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab { padding: 8px 16px; cursor: pointer; border-radius: 6px; font-weight: bold; color: var(--text-muted); }
        .tab.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .ticket {
            background: var(--bg-dark); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 10px;
        }
        .ticket-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .ticket-status { font-weight: bold; }
        .ticket-status.open { color: var(--warning); }
        .ticket-status.closed { color: var(--success); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><span>GhostVerse</span> Admin Panel</h1>
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <button id="maintenance-toggle" onclick="toggleMaintenance()" class="btn-warning">Maintenance Mode: Loading...</button>
                <div id="admin-info">Loading admin status...</div>
            </div>
        </header>

        <div id="error-box"></div>

        <div class="stat-boxes" id="stat-boxes">
            <div class="stat-box"><div class="label">Total Users</div><div class="number" id="stat-total-users">-</div></div>
            <div class="stat-box"><div class="label">Online Users</div><div class="number" id="stat-online-users">-</div></div>
            <div class="stat-box"><div class="label">Total Tickets</div><div class="number" id="stat-total-tickets">-</div></div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('users-tab', this)">Users & Settings</div>
            <div class="tab" onclick="switchTab('tickets-tab', this); fetchTickets();">Support Tickets</div>
        </div>

        <div id="users-tab" class="tab-content active">
            <div class="grid">
                <!-- Users List -->
                <div class="card">
                    <div class="card-header">
                        <h2>Manage Users</h2>
                        <button onclick="fetchUsers()">Refresh</button>
                    </div>

                    <!-- Ban/Action by Username Form -->
                    <div class="form-group" style="padding: 10px; background: var(--bg-dark); border-radius: 8px; border: 1px solid var(--border);">
                        <input type="text" id="target-username" placeholder="Enter username...">
                        <button class="btn-danger" onclick="actionByUsername('BAN')">Ban</button>
                        <button class="btn-danger" onclick="actionByUsername('DELETE')" style="background: var(--danger);">Delete</button>
                    </div>

                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Joined</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="users-tbody">
                                <tr><td colspan="5" style="text-align: center;">Loading users...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- World Chat Monitoring -->
                <div class="card">
                    <div class="card-header">
                        <h2>World Chat Monitor</h2>
                        <button onclick="fetchWorldChat()">Refresh</button>
                    </div>
                    <div class="chat-container" id="chat-container">
                        <div style="text-align: center; color: var(--text-muted);">Loading chat...</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tickets-tab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2>Support Tickets</h2>
                    <button onclick="fetchTickets()">Refresh</button>
                </div>
                <div id="tickets-container">
                    <div style="text-align: center; color: var(--text-muted);">Loading tickets...</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let isMaintenanceMode = false;

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Check admin authorization on load
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                
                if (!res.ok || !data.success) {
                    showError("You are not logged in. Please log in to GhostVerse first.");
                    return false;
                }

                if (data.data.role !== 'ADMIN') {
                    showError("Access Denied. You must be an ADMIN to view this panel.");
                    document.getElementById('admin-info').innerHTML = `<span class="badge badge-banned">Unauthorized</span>`;
                    return false;
                }

                document.getElementById('admin-info').innerHTML = `Welcome, <b>${data.data.username}</b> <span class="badge badge-admin">ADMIN</span>`;
                return true;
            } catch (err) {
                showError("Failed to authenticate.");
                return false;
            }
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            box.textContent = msg;
            box.style.display = 'block';
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-total-users').textContent = data.data.totalUsers;
                    document.getElementById('stat-online-users').textContent = data.data.onlineUsers;
                }
            } catch (e) {
                console.error("Failed to fetch stats", e);
            }
        }

        async function fetchSettings() {
            try {
                const res = await fetch('/api/admin/settings');
                const data = await res.json();
                if (data.success) {
                    isMaintenanceMode = data.data.maintenanceMode || false;
                    updateMaintenanceBtn();
                }
            } catch (e) {
                console.error("Failed to fetch settings", e);
            }
        }

        function updateMaintenanceBtn() {
            const btn = document.getElementById('maintenance-toggle');
            if (isMaintenanceMode) {
                btn.textContent = "Maintenance Mode: ON (Turn OFF)";
                btn.className = "btn-danger";
            } else {
                btn.textContent = "Maintenance Mode: OFF (Turn ON)";
                btn.className = "btn-success";
            }
        }

        async function toggleMaintenance() {
            const newState = !isMaintenanceMode;
            if (!confirm(`Are you sure you want to turn Maintenance Mode ${newState ? 'ON' : 'OFF'}?`)) return;
            try {
                const res = await fetch('/api/admin/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ maintenanceMode: newState })
                });
                if (res.ok) {
                    isMaintenanceMode = newState;
                    updateMaintenanceBtn();
                } else {
                    alert("Failed to update settings");
                }
            } catch (e) {
                alert("Request failed");
            }
        }

        async function fetchUsers() {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Loading...</td></tr>';
            
            try {
                const res = await fetch('/api/admin/users');
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);

                tbody.innerHTML = '';
                data.data.forEach(user => {
                    const statusClass = user.status === 'ACTIVE' ? 'badge-active' : (user.status === 'BANNED' ? 'badge-banned' : 'badge-muted');
                    const roleClass = user.role === 'ADMIN' ? 'badge-admin' : 'badge-user';
                    const date = new Date(user.createdAt).toLocaleDateString();

                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <b>${user.displayName}</b><br>
                                <span style="color: var(--text-muted); font-size: 11px;">@${user.username}</span>
                            </td>
                            <td><span class="badge ${roleClass}">${user.role}</span></td>
                            <td><span class="badge ${statusClass}">${user.status}</span></td>
                            <td>${date}</td>
                            <td class="actions">
                                ${user.status !== 'BANNED' ? `<button class="btn-warning" onclick="updateUserStatus('${user.id}', 'BAN')">Ban</button>` : ''}
                                ${user.status !== 'MUTED' && user.status !== 'BANNED' ? `<button class="btn-warning" onclick="updateUserStatus('${user.id}', 'MUTE')">Mute</button>` : ''}
                                ${user.status !== 'ACTIVE' ? `<button class="btn-success" onclick="updateUserStatus('${user.id}', 'ACTIVE')">Unban/Unmute</button>` : ''}
                                <button class="btn-danger" style="background:var(--danger);color:white;" onclick="updateUserStatus('${user.id}', 'DELETE')">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" style="color: red; text-align: center;">Error: ${err.message}</td></tr>`;
            }
        }

        async function updateUserStatus(userId, action) {
            if (action === 'DELETE') {
                if (!confirm(`DANGER: Are you absolutely sure you want to permanently DELETE this user? This cannot be undone.`)) return;
            } else {
                if (!confirm(`Are you sure you want to ${action} this user?`)) return;
            }
            try {
                const res = await fetch('/api/admin/users', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, action })
                });
                const data = await res.json();
                if (res.ok) {
                    fetchUsers();
                    fetchStats();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Request failed');
            }
        }

        async function actionByUsername(action) {
            const username = document.getElementById('target-username').value.trim();
            if (!username) return alert("Please enter a username");
            
            if (action === 'DELETE') {
                if (!confirm(`DANGER: Are you absolutely sure you want to permanently DELETE @${username}?`)) return;
            } else {
                if (!confirm(`Are you sure you want to ${action} @${username}?`)) return;
            }
            try {
                const res = await fetch('/api/admin/users', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetUsername: username, action })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('target-username').value = '';
                    fetchUsers();
                    fetchStats();
                    alert("Success");
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Request failed');
            }
        }

        async function fetchWorldChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = '<div style="text-align: center; color: var(--text-muted);">Loading...</div>';
            
            try {
                const res = await fetch('/api/world-chat?limit=50');
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);

                container.innerHTML = '';
                const messages = data.data.reverse();
                
                messages.forEach(msg => {
                    const date = new Date(msg.createdAt).toLocaleString();
                    container.innerHTML += `
                        <div class="chat-msg">
                            <div class="chat-header">
                                <span class="chat-author">@${msg.sender.username}</span>
                                <span>${date}</span>
                            </div>
                            <div>${msg.content}</div>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = `<div style="color: red; text-align: center;">Error: ${err.message}</div>`;
            }
        }

        async function fetchTickets() {
            const container = document.getElementById('tickets-container');
            container.innerHTML = '<div style="text-align: center; color: var(--text-muted);">Loading tickets...</div>';
            
            try {
                const res = await fetch('/api/admin/tickets');
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);

                container.innerHTML = '';
                document.getElementById('stat-total-tickets').textContent = data.data.length;

                if (data.data.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: var(--text-muted);">No tickets found.</div>';
                    return;
                }

                data.data.forEach(ticket => {
                    const date = new Date(ticket.createdAt).toLocaleString();
                    const statusClass = ticket.status === 'OPEN' ? 'open' : 'closed';
                    
                    container.innerHTML += `
                        <div class="ticket">
                            <div class="ticket-header">
                                <div>
                                    <span class="chat-author">@${ticket.username}</span> 
                                    <span style="color:var(--text-muted);font-size:12px;margin-left:10px;">${date}</span>
                                </div>
                                <span class="ticket-status ${statusClass}">${ticket.status}</span>
                            </div>
                            <h3 style="margin: 0 0 10px 0; font-size: 16px;">${ticket.subject}</h3>
                            <p style="margin: 0 0 15px 0; font-size: 14px; color: var(--text-main); white-space: pre-wrap;">${ticket.description}</p>
                            
                            ${ticket.status === 'OPEN' ? `
                                <div style="display:flex;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
                                    <input type="text" id="reply-${ticket.id}" placeholder="Type reply here..." style="flex:1;padding:8px;border-radius:6px;background:var(--bg-dark);color:white;border:1px solid var(--border);">
                                    <button class="btn-primary" onclick="replyTicket('${ticket.id}')">Reply & Close</button>
                                </div>
                            ` : `
                                <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
                                    <span style="color:var(--primary);font-weight:bold;">Admin Reply:</span>
                                    <p style="margin:5px 0 0 0;font-size:14px;color:var(--text-muted);">${ticket.reply}</p>
                                </div>
                            `}
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = `<div style="color: red; text-align: center;">Error: ${err.message}</div>`;
            }
        }

        async function replyTicket(ticketId) {
            const replyInput = document.getElementById(`reply-${ticketId}`);
            if (!replyInput.value.trim()) return alert("Reply cannot be empty");

            try {
                const res = await fetch('/api/admin/tickets', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticketId, reply: replyInput.value.trim(), action: 'CLOSE' })
                });
                
                if (res.ok) {
                    fetchTickets();
                } else {
                    const data = await res.json();
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Request failed');
            }
        }

        // Initialize
        async function init() {
            const isAuth = await checkAuth();
            if (isAuth) {
                fetchStats();
                fetchSettings();
                fetchUsers();
                fetchWorldChat();
            }
        }

        init();
    </script>
</body>
</html>
